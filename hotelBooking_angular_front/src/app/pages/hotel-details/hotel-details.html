<div class="flex items-center justify-between mb-4">
  <div>
    <h1 class="text-2xl font-semibold">Hotel details</h1>
    <div class="text-sm opacity-70">Rooms</div>
  </div>
  <a mat-button routerLink="/hotels">Back</a>
</div>

<form class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4" [formGroup]="form">
  <mat-form-field appearance="outline">
    <mat-label>Date start</mat-label>
    <input matInput type="date" formControlName="dateStart" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Date end</mat-label>
    <input matInput type="date" formControlName="dateEnd" />
  </mat-form-field>
</form>

<div *ngIf="loading$ | async" class="flex justify-center py-8">
  <mat-spinner diameter="40" />
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4" *ngIf="!(loading$ | async)">
  <ng-container *ngFor="let room of (items$ | async); let i = index">
    <mat-card class="mb-4">
      <img *ngIf="room.images && room.images.length > 0" mat-card-image [src]="room.images[0]" alt="room" class="h-48 object-cover" />
      <mat-card-title class="p-4">{{ i === 0 ? 'Стандарт' : 'Люкс' }}</mat-card-title>
      <mat-card-content class="p-4">
        <div class="text-sm opacity-80">{{ room.description }}</div>
      </mat-card-content>
      <mat-card-actions align="end" class="px-4 pb-4 pt-2">
        @if ((user$ | async)?.role === 'client') {
          <button mat-raised-button color="primary" (click)="book(room.id)">Забронировать</button>
        }
        @if ((user$ | async)?.role !== 'client') {
          <span class="text-sm opacity-50">Бронирование доступно только для гостей</span>
        }
      </mat-card-actions>
    </mat-card>
  </ng-container>
</div>
