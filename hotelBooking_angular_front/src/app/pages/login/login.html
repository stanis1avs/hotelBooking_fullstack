<div class="max-w-md mx-auto">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
      <mat-card-subtitle>Use your email and password</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="grid gap-4" [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" />
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="(loading$ | async) === true">
          <span *ngIf="(loading$ | async) !== true">Login</span>
          <span *ngIf="(loading$ | async) === true" class="inline-flex items-center gap-2">
            <mat-spinner diameter="18" />
            Loading
          </span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <a mat-button routerLink="/register">Create account</a>
    </mat-card-actions>
  </mat-card>
</div>
