<div class="flex items-center justify-between mb-4">
  <div>
    <h1 class="text-2xl font-semibold">Support</h1>
    <div class="text-sm opacity-70">Support requests</div>
  </div>
  <button mat-raised-button color="primary" (click)="reload()">Reload</button>
</div>

<div *ngIf="loading$ | async" class="flex justify-center py-8">
  <mat-spinner diameter="40" />
</div>

<div class="grid grid-cols-1 gap-4" *ngIf="!(loading$ | async)">
  <ng-container *ngFor="let s of (items$ | async)">
    <mat-card>
      <mat-card-header>
        <mat-card-title>Support request</mat-card-title>
        <mat-card-subtitle>Details</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <pre class="text-xs overflow-auto">{{ s | json }}</pre>
      </mat-card-content>
    </mat-card>
  </ng-container>
</div>
